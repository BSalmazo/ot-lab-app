name: Build Agent

on:
  workflow_dispatch:
  push:
    paths:
      - "agent.py"
      - "agent/**"
      - "agent-bundle.spec"
      - "requirements.txt"
      - ".github/workflows/build-agent.yml"

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: otlab-agent-linux
            output-path: dist/otlab_agent
          - os: windows-latest
            artifact-name: otlab-agent-windows
            output-path: dist/otlab_agent.exe
          - os: macos-latest
            artifact-name: otlab-agent-macos
            output-path: dist/otlab_agent
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (spec)
        run: |
          pyinstaller --noconfirm --clean agent-bundle.spec --distpath ./dist --workpath ./build

      - name: Make binary executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.output-path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.output-path }}
          if-no-files-found: error
