name: Build Agent

on:
  workflow_dispatch:
  push:
    paths:
      - "agent.py"
      - ".github/workflows/build-agent.yml"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show current directory
        run: |
          python -c "import os; print(os.getcwd())"

      - name: List repository files
        run: |
          python -c "import os; print('\n'.join(sorted(os.listdir('.'))))"

      - name: Find agent.py
        run: |
          python -c "import pathlib; print('\n'.join(str(p) for p in pathlib.Path('.').rglob('agent.py')))"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests scapy

      - name: Build with PyInstaller
        run: |
          python -c "import pathlib, subprocess; p=list(pathlib.Path('.').rglob('agent.py')); subprocess.check_call(['pyinstaller','--onefile','--name','otlab-agent', str(p[0])])"

      - name: List dist files
        run: |
          python -c "import os, pathlib; d=pathlib.Path('dist'); print('\n'.join(str(p) for p in d.iterdir()) if d.exists() else 'dist not found')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otlab-agent-${{ runner.os }}
          path: |
            dist/otlab-agent
            dist/otlab-agent.exe