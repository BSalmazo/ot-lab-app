name: Build and Release Agent Binaries

on:
  push:
    branches:
      - main
      - refactor/codex-setup
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: otlab-agent-windows.exe
            output-path: dist/otlab_agent.exe
          - os: macos-latest
            artifact-name: otlab-agent-macos
            output-path: dist/otlab_agent
          - os: ubuntu-latest
            artifact-name: otlab-agent-linux
            output-path: dist/otlab_agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller agent-bundle.spec --distpath ./dist --workpath ./build

      - name: Build with PyInstaller (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller agent-bundle.spec --distpath ./dist --workpath ./build

      - name: Make binary executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.output-path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.output-path }}
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-latest:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/refactor/codex-setup' && github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts for release
        run: |
          mkdir -p release-assets
          # Copy and rename artifacts to a flat directory
          cp artifacts/otlab-agent-windows.exe/otlab_agent.exe release-assets/otlab-agent-windows-amd64.exe
          cp artifacts/otlab-agent-macos/otlab_agent release-assets/otlab-agent-macos-amd64
          cp artifacts/otlab-agent-linux/otlab_agent release-assets/otlab-agent-linux-amd64
          chmod +x release-assets/otlab-agent-*
          ls -la release-assets/

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create/Update Dev Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-latest
          name: Dev Latest Build (${{ steps.date.outputs.date }})
          files: release-assets/*
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
