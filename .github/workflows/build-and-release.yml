name: Build and Release Agent Binaries

on:
  push:
    branches:
      - main
      - refactor/codex-setup
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: otlab-agent-windows.exe
            output-path: dist/otlab_agent.exe
          - os: macos-latest
            artifact-name: otlab-agent-macos
            output-path: dist/otlab_agent
          - os: ubuntu-latest
            artifact-name: otlab-agent-linux
            output-path: dist/otlab_agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller agent-bundle.spec --distpath ./dist --workpath ./build

      - name: Build with PyInstaller (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller agent-bundle.spec --distpath ./dist --workpath ./build

      - name: Make binary executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.output-path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.output-path }}
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts for release
        run: |
          mkdir -p release-assets
          
          # Copy and rename agent binaries to a flat directory
          cp artifacts/otlab-agent-windows.exe/otlab_agent.exe release-assets/otlab-agent-windows-amd64.exe
          cp artifacts/otlab-agent-macos/otlab_agent release-assets/otlab-agent-macos-amd64
          cp artifacts/otlab-agent-linux/otlab_agent release-assets/otlab-agent-linux-amd64
          chmod +x release-assets/otlab-agent-*
          
          # Copy installation scripts
          cp scripts/install-macos.sh release-assets/
          cp scripts/install-linux.sh release-assets/
          cp scripts/install-windows.bat release-assets/
          chmod +x release-assets/install-*.sh
          
          # Copy documentation
          cp scripts/INSTALLATION.md release-assets/
          
          echo "📦 Release assets organized:"
          ls -lah release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-latest:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/refactor/codex-setup' && github.event_name == 'push' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts for release
        run: |
          mkdir -p release-assets
          
          # Copy and rename agent binaries to a flat directory
          cp artifacts/otlab-agent-windows.exe/otlab_agent.exe release-assets/otlab-agent-windows-amd64.exe
          cp artifacts/otlab-agent-macos/otlab_agent release-assets/otlab-agent-macos-amd64
          cp artifacts/otlab-agent-linux/otlab_agent release-assets/otlab-agent-linux-amd64
          chmod +x release-assets/otlab-agent-*
          
          # Copy installation scripts
          cp scripts/install-macos.sh release-assets/
          cp scripts/install-linux.sh release-assets/
          cp scripts/install-windows.bat release-assets/
          chmod +x release-assets/install-*.sh
          
          # Copy documentation
          cp scripts/INSTALLATION.md release-assets/
          
          echo "📦 Release assets organized:"
          ls -lah release-assets/

      - name: Sync downloads/agent in repository
        run: |
          mkdir -p downloads/agent/windows downloads/agent/mac downloads/agent/linux

          cp artifacts/otlab-agent-windows.exe/otlab_agent.exe downloads/agent/windows/otlab-agent.exe
          cp artifacts/otlab-agent-macos/otlab_agent downloads/agent/mac/otlab-agent-mac
          cp artifacts/otlab-agent-linux/otlab_agent downloads/agent/linux/otlab-agent-linux

          chmod +x downloads/agent/mac/otlab-agent-mac downloads/agent/linux/otlab-agent-linux

          echo "📁 Synced downloads/agent:"
          ls -lah downloads/agent/windows downloads/agent/mac downloads/agent/linux

      - name: Commit synced downloads/agent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/agent/windows/otlab-agent.exe downloads/agent/mac/otlab-agent-mac downloads/agent/linux/otlab-agent-linux
          if git diff --cached --quiet; then
            echo "No binary changes to commit."
            exit 0
          fi
          git commit -m "chore(downloads): sync latest agent binaries [skip ci]"
          git push

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Clean previous dev-latest assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Remove all existing assets from dev-latest so only newest files remain.
          # This prevents stale binaries (e.g., legacy file names) from persisting.
          if gh release view dev-latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            mapfile -t ASSET_NAMES < <(gh release view dev-latest --repo "${{ github.repository }}" --json assets -q '.assets[].name')
            if [ "${#ASSET_NAMES[@]}" -gt 0 ]; then
              for asset in "${ASSET_NAMES[@]}"; do
                echo "Deleting old asset: $asset"
                gh release delete-asset dev-latest "$asset" --repo "${{ github.repository }}" --yes
              done
            else
              echo "No previous assets found on dev-latest."
            fi
          else
            echo "dev-latest release not found yet; nothing to clean."
          fi

      - name: Create/Update Dev Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-latest
          name: Dev Latest Build (${{ steps.date.outputs.date }})
          files: release-assets/*
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
